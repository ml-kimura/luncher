# クラウドへホストする前に、apps/web、apps/api の Docker イメージを
# ローカルで確認するための定義で、本番運用を想定したものではありません。
# .devcontainer/docker-compose.yml と同じ Compose プロジェクト名のネットワークに参加させ、
# Dev Container 側で起動している `db` に api から接続できるようにしています。
name: luncher-devcontainer

services:
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${API_PORT:-18787}}
    ports:
      - '${WEB_PORT:-13000}:3000'
    networks:
      - devcontainer_net
    environment:
      HOSTNAME: 0.0.0.0

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    ports:
      - '${API_PORT:-18787}:8787'
    networks:
      - devcontainer_net
    environment:
      DATABASE_URL: ${DATABASE_URL}

networks:
  devcontainer_net:
    name: luncher-devcontainer_default
    external: true
