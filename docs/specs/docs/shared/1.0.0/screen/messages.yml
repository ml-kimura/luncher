# 画面メッセージ定義
# プレフィックス: I=Info, W=Warning, E=Error, F=Fatal

messages:
  # Info messages
  - code: I001
    message:
      ja: ようこそ！ログインしました
      en: Welcome! You have logged in
  - code: I002
    message:
      ja: パスワード再設定メールを送信しました
      en: Password reset email has been sent
  - code: I003
    message:
      ja: 設定を保存しました
      en: Settings saved successfully

  # Warning messages
  - code: W001
    message:
      ja: セッションがまもなく切れます
      en: Your session will expire soon
  - code: W002
    message:
      ja: 入力内容が保存されていません
      en: Your changes have not been saved

  # Error messages
  - code: E001
    message:
      ja: メールアドレスを入力してください
      en: Please enter your email address
  - code: E002
    message:
      ja: 正しいメールアドレス形式で入力してください
      en: Please enter a valid email address
  - code: E003
    message:
      ja: パスワードを入力してください
      en: Please enter your password
  - code: E004
    message:
      ja: メールアドレスまたはパスワードが正しくありません
      en: Invalid email or password
  - code: E005
    message:
      ja: 入力内容に誤りがあります
      en: There are errors in your input

  # Fatal messages
  - code: F001
    message:
      ja: システムエラーが発生しました。管理者に連絡してください
      en: A system error occurred. Please contact the administrator
  - code: F002
    message:
      ja: サーバーに接続できません
      en: Unable to connect to server
