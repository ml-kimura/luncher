# Features configuration (merges navItems and sidebarLabels)
features:
  overview:
    label: 'Overview'
  home:
    label: 'Home'
    path: ''
    name: 'Luncher Specs'
    text: 'Collaboration Lunch Matching Application Specifications'
    description: 'Welcome to the Luncher specifications site'
  userStories:
    label: 'User Stories'
    path: 'user-stories'
    icon: '🧩'
    description: 'Provides user stories and execution-owner mapping (Slack / Batch / Web)'
  screen:
    label: 'Screen'
    path: 'screen'
    icon: '🖥️'
    description: 'Detailed design specifications and screen flow diagrams'
    items:
      flow: 'Screen Flow Diagram'
      design: 'UI Specifications'
      messages: 'Messages'
  api:
    label: 'API'
    path: 'api'
    icon: '📡'
    description: 'API documentation based on OpenAPI specifications'
    items:
      design: 'API Design'
      messages: 'Messages'
  batch:
    label: 'Batch'
    path: 'batch'
    icon: '⚙️'
    description: 'Batch process design specifications and flow diagrams'
    items:
      flow: 'Batch Flow Diagram'
      design: 'Batch Design Document'
      messages: 'Messages'
  database:
    label: 'Database'
    path: 'database'
    icon: '🗄️'
    description: 'Database schema and design information'
    items:
      cdm: 'Conceptual Data Model'
      ldm: 'Logical Data Model'
      pdm: 'Physical Data Model'
  infrastructure:
    label: 'Infrastructure'
    path: 'infrastructure'
    icon: '🏗️'
    description: 'Infrastructure configuration information'
  glossary:
    label: 'Glossary'
    path: 'glossary'
    icon: '📚'
    description: 'Definitions of terms used in the system'
  history:
    label: 'Release History'
    path: 'history'
    description: 'View release notes and change history for each version'

