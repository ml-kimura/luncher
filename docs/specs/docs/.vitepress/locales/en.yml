# Document sections configuration
# Each section (screen, batch) has subsections (design, flow)
# fields: defines fields for both list table and detail page basic info
docSections:
  screen:
    design:
      title: 'UI Specifications'
      description: 'Detailed design specifications for each screen.'
      listLabel: 'List'
      infoTitle: 'Basic Information'
      fields:
        - key: id
          label: 'Screen ID'
        - key: title
          label: 'Screen Name'
        - key: url
          label: 'URL'
        - key: auth
          label: 'Authentication'
    flow:
      title: 'Screen Flow Diagram'
      description: 'Flow diagrams showing screen transitions in the system.'
      listLabel: 'List'
      infoTitle: 'Basic Information'
      fields:
        - key: id
          label: 'Flow ID'
        - key: title
          label: 'Flow Name'
        - key: description
          label: 'Description'
  batch:
    design:
      title: 'Batch Design Document'
      description: 'Detailed design specifications for each batch process.'
      listLabel: 'List'
      infoTitle: 'Basic Information'
      fields:
        - key: id
          label: 'Batch ID'
        - key: title
          label: 'Batch Name'
        - key: timing
          label: 'Execution Timing'
        - key: duration
          label: 'Expected Duration'
        - key: retry
          label: 'Retry'
    flow:
      title: 'Batch Flow Diagram'
      description: 'Diagrams showing the batch process flows in the system.'
      listLabel: 'List'
      infoTitle: 'Basic Information'
      fields:
        - key: id
          label: 'Flow ID'
        - key: title
          label: 'Flow Name'
        - key: timing
          label: 'Execution Timing'
        - key: duration
          label: 'Expected Duration'
        - key: description
          label: 'Description'
  api:
    design:
      title: 'API Design'
      description: 'A list of design information for each API.'
      listLabel: 'List'
      infoTitle: 'Basic Information'
      fields:
        - key: title
          label: 'API Name'
        - key: description
          label: 'Description'
  database:
    cdm:
      title: 'Conceptual Data Model'
      description: 'Detailed design specifications for each database.'
      listLabel: 'List'
      infoTitle: 'Basic Information'
      fields:
        - key: id
          label: 'Database ID'
        - key: title
          label: 'Database Name'
        - key: description
          label: 'Description'
    ldm:
      title: 'Logical Data Model'
      description: 'Detailed design specifications for each database.'
      listLabel: 'List'
      infoTitle: 'Basic Information'
      fields:
        - key: id
          label: 'Database ID'
        - key: title
          label: 'Database Name'
        - key: description
          label: 'Description'
    pdm:
      title: 'Physical Data Model'
      description: 'Detailed design specifications for each database.'
      listLabel: 'List'
      infoTitle: 'Basic Information'
      fields:
        - key: id
          label: 'Database ID'
        - key: title
          label: 'Database Name'
        - key: description
          label: 'Description'

