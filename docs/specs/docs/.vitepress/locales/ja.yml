    items:
      flow: '画面遷移図'
      design: '画面設計書'
      messages: 'メッセージ'
  api:
    label: 'API'
    path: 'api'
    icon: '📡'
    description: 'OpenAPI仕様に基づいたAPIドキュメントを提供します'
    items:
      design: 'API設計'
  batch:
    label: 'バッチ'
    path: 'batch'
    icon: '⚙️'
    description: 'バッチ処理の設計仕様とフロー図を提供します'
    items:
      flow: 'バッチフロー'
      design: 'バッチ設計書'
      messages: 'メッセージ'
  database:
    label: 'データベース'
    path: 'database'
    icon: '🗄️'
    description: 'データベーススキーマと設計情報を提供します'
