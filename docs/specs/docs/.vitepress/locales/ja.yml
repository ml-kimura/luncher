# Document sections configuration
# Each section (screen, batch) has subsections (design, flow)
# fields: defines fields for both list table and detail page basic info
docSections:
  screen:
    design:
      title: '画面設計書'
      description: '各画面の詳細な設計仕様です。'
      listLabel: '一覧'
      infoTitle: '基本情報'
      fields:
        - key: id
          label: '画面ID'
        - key: title
          label: '画面名'
        - key: url
          label: 'URL'
        - key: auth
          label: '認証'
    flow:
      title: '画面遷移図'
      description: 'システム内の画面遷移を示すフロー図です。'
      listLabel: '一覧'
      infoTitle: '基本情報'
      fields:
        - key: id
          label: 'フローID'
        - key: title
          label: 'フロー名'
        - key: description
          label: '説明'
  batch:
    design:
      title: 'バッチ設計書'
      description: '各バッチ処理の詳細な設計仕様です。'
      listLabel: '一覧'
      infoTitle: '基本情報'
      fields:
        - key: id
          label: 'バッチID'
        - key: title
          label: 'バッチ名'
        - key: timing
          label: '実行タイミング'
        - key: duration
          label: '想定実行時間'
        - key: retry
          label: 'リトライ'
    flow:
      title: 'バッチフロー'
      description: 'システム内のバッチ処理フローを示す図です。'
      listLabel: '一覧'
      infoTitle: '基本情報'
      fields:
        - key: id
          label: 'フローID'
        - key: title
          label: 'フロー名'
        - key: timing
          label: '実行タイミング'
        - key: duration
          label: '想定実行時間'
        - key: description
          label: '説明'
  api:
    design:
      title: 'API設計'
      description: '各 API の設計情報を一覧化しています。'
      listLabel: '一覧'
      infoTitle: '基本情報'
      fields:
        - key: title
          label: 'API名'
        - key: description
          label: '説明'
  database:
    cdm:
      title: '概念データモデル'
      description: '概念データモデルは、システムのデータの基本的な構造を示すモデルです。'
      listLabel: '一覧'
      infoTitle: '基本情報'
      fields:
        - key: id
          label: 'データベースID'
        - key: title
          label: 'データベース名'
        - key: description
          label: '説明'
    ldm:
      title: '論理データモデル'
      description: '論理データモデルは、システムのデータの論理的な構造を示すモデルです。'
      listLabel: '一覧'
      infoTitle: '基本情報'
      fields:
        - key: id
          label: 'データベースID'
        - key: title
          label: 'データベース名'
        - key: description
          label: '説明'
    pdm:
      title: '物理データモデル'
      description: '物理データモデルは、システムのデータの物理的な構造を示すモデルです。'
      listLabel: '一覧'
      infoTitle: '基本情報'
      fields:
        - key: id
          label: 'データベースID'
        - key: title
          label: 'データベース名'
        - key: description
          label: '説明'

