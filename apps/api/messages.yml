messages:
  - code: I-API-001
    const: INFO_REQUEST_PROCESSED
    message:
      ja: リクエストを正常に処理しました
      en: Request processed successfully
  - code: W-API-001
    const: WARN_NO_STATE_CHANGE
    message:
      ja: リクエストは受理されましたが、状態は変更されませんでした
      en: Request accepted but no state change occurred
  - code: E-API-001
    const: ERROR_INVALID_REQUEST
    message:
      ja: リクエストの形式が不正です。{detail}
      en: Invalid request format. {detail}
  - code: E-API-002
    const: ERROR_INVALID_SIGNATURE
    message:
      ja: 署名検証に失敗しました
      en: Signature verification failed
  - code: E-API-003
    const: ERROR_UNAUTHORIZED_OPERATION
    message:
      ja: 認可されていない操作です
      en: Operation not authorized
  - code: E-API-004
    const: ERROR_DUPLICATE_EVENT
    message:
      ja: 同一イベントが既に処理されています
      en: Duplicate event already processed
  - code: F-API-001
    const: FATAL_INTERNAL_ERROR
    message:
      ja: 内部エラーが発生しました
      en: Internal server error occurred
