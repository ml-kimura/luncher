name: Branch Name Guard

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - develop
      - staging

jobs:
  branch-name-guard:
    name: branch-name-guard
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name against conventional policy
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Reference: https://conventional-branch.github.io/#specification
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BRANCH_NAME="$HEAD_REF"
          else
            BRANCH_NAME="$REF_NAME"
          fi

          echo "Checking branch: $BRANCH_NAME"

          # Allowed trunk branches.
          if printf "%s" "$BRANCH_NAME" | grep -Eq '^(main|develop|staging)$'; then
            echo "Allowed protected branch name."
            exit 0
          fi

          # Conventional Branch format: <type>/<description>
          # type: feature|feat|bugfix|fix|hotfix|release|chore
          # description: lowercase letters/numbers, hyphens, optional dots in segments
          PATTERN='^(feature|feat|bugfix|fix|hotfix|release|chore)/[a-z0-9]+(\.[a-z0-9]+)*(-[a-z0-9]+(\.[a-z0-9]+)*)*$'

          if printf "%s" "$BRANCH_NAME" | grep -Eq "$PATTERN"; then
            echo "Branch name is valid."
            exit 0
          fi

          echo "Invalid branch name: $BRANCH_NAME"
          echo "Expected one of:"
          echo "  - main | develop | staging"
          echo "  - <type>/<description>"
          echo "where type is:"
          echo "  feature|feat|bugfix|fix|hotfix|release|chore"
          echo "and description is lowercase letters/numbers with hyphens and optional dots."
          exit 1
